  version: '3.8'

  services:
    postgres:
      image: postgres:16
      container_name: replication-postgres
      restart: unless-stopped
      environment:
        POSTGRES_DB: replication_db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      ports:
        - "5433:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data

    kafka:
      image: apache/kafka:3.9.0
      container_name: replication-kafka
      restart: unless-stopped
      ports:
        - "9092:9092"
      environment:
        KAFKA_NODE_ID: 1
        KAFKA_PROCESS_ROLES: broker,controller
        KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
        KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
        KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
        KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

    replication-service:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: replication-service
      depends_on:
        - postgres
        - kafka
      ports:
        - "8082:8082"
      environment:
        SERVER_PORT: 8082

        DB_URL: jdbc:postgresql://postgres:5432/replication_db
        DB_USER: postgres
        DB_PASSWORD: postgres

        KAFKA_BOOTSTRAP_SERVERS: kafka:9092
        KV_EVENTS_TOPIC: kv-events

  volumes:
    postgres_data:
