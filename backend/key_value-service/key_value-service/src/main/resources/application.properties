spring.application.name=key-value-service

# reads SERVER_PORT from env, defaults to 8081
server.port=${SERVER_PORT:8081}

# reads NODE_ID from env, defaults to node-1
app.node-id=${NODE_ID:node-1}

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kv_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Kafka Producer only
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
app.kafka.topics.kv-events=${KV_EVENTS_TOPIC:kv-events}

# Eureka disabled
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always