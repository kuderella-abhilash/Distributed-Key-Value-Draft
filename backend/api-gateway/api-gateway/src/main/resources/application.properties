spring.application.name=api-gateway
server.port=8000

# ==========================
# KV SERVICE ROUTE
# ==========================
spring.cloud.gateway.server.webflux.routes[0].id=kv-service-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://kv-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/keys/**
spring.cloud.gateway.server.webflux.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.name=kvServiceCircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.fallbackUri=forward:/fallback/kv-service


# Static service instances for load balancer
#spring.cloud.loadbalancer.instances.kv-service[0].host=localhost
#spring.cloud.loadbalancer.instances.kv-service[0].port=8081
#spring.cloud.loadbalancer.instances.kv-service[1].host=localhost
#spring.cloud.loadbalancer.instances.kv-service[1].port=8085
#spring.cloud.loadbalancer.instances.kv-service[2].host=localhost
#spring.cloud.loadbalancer.instances.kv-service[2].port=8086

#spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8081
# ==========================
# REPLICATION SERVICE ROUTE
# ==========================
spring.cloud.gateway.server.webflux.routes[1].id=replication-service-route
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/replicas/**,/api/v1/replication/**

# ==========================
# CLUSTER SERVICE ROUTE
# ==========================
spring.cloud.gateway.server.webflux.routes[2].id=cluster-service-route
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/cluster/**

# ==========================
# METRICS SERVICE ROUTE
# ==========================
spring.cloud.gateway.server.webflux.routes[3].id=metrics-service-route
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8084
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/metrics/**

# ==========================
# STATIC NODE LIST
# ==========================
app.kv-nodes[0]=http://localhost:8081
app.kv-nodes[1]=http://localhost:8085
app.kv-nodes[2]=http://localhost:8086

# ==========================
# GLOBAL CORS
# ==========================
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3001,http://localhost:5173
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*


logging.level.org.springframework.cloud.loadbalancer=TRACE
logging.level.reactor.netty=DEBUG

# ==========================
# RESILIENCE4J CIRCUIT BREAKER
# ==========================
resilience4j.circuitbreaker.instances.kvServiceCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.kvServiceCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.kvServiceCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.kvServiceCircuitBreaker.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.kvServiceCircuitBreaker.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.timelimiter.instances.kvServiceCircuitBreaker.timeoutDuration=4s

# ==========================
# ACTUATOR
# ==========================
management.endpoints.web.exposure.include=health,info,gateway,circuitbreakers
management.endpoint.health.show-details=always

# ==========================
# LOGGING
# ==========================
logging.level.org.springframework.cloud.gateway=DEBUG
#logging.level.org.springframework.cloud.loadbalancer=DEBUG

# ==========================
# EUREKA DISABLED
# ==========================
#eureka.client.enabled=false
#spring.cloud.discovery.enabled=false

eureka.client.enabled=true
spring.cloud.discovery.enabled=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

management.endpoints.web.cors.allowed-origins=http://localhost:5173
management.endpoints.web.cors.allowed-methods=GET