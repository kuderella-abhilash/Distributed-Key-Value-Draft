spring.application.name=api-gateway
server.port=${SERVER_PORT:8080}

#  Route 1: KV operations, load-balanced across 3 nodes
spring.cloud.gateway.routes[0].id=kv-service-route
spring.cloud.gateway.routes[0].uri=lb://kv-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/keys/**
spring.cloud.gateway.routes[0].filters[0].name=CircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.name=kvServiceCircuitBreaker
spring.cloud.gateway.routes[0].filters[0].args.fallbackUri=forward:/fallback/kv-service


#  Route 3: Metrics dashboard data
spring.cloud.gateway.routes[2].id=metrics-service-route
spring.cloud.gateway.routes[2].uri=http://metrics-service:8084
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/metrics/**

#  Route 4: Replication logs and replica inspection
spring.cloud.gateway.routes[3].id=replication-service-route
spring.cloud.gateway.routes[3].uri=http://replication-service:8082
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/replicas/**,/api/v1/replication/**

#  CORS  lets React dev server call the Gateway directly
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3001,http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

#  Static KV node list (used by KvServiceLoadBalancerConfig)
app.kv-nodes[0]=http://kv-node-1:8081
app.kv-nodes[1]=http://kv-node-2:8081
app.kv-nodes[2]=http://kv-node-3:8081

spring.cloud.loadbalancer.eager-load.clients=kv-service

# Circuit breaker (Resilience4j)
resilience4j.circuitbreaker.instances.kvServiceCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.kvServiceCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.kvServiceCircuitBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.clusterServiceCircuitBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.clusterServiceCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.clusterServiceCircuitBreaker.waitDurationInOpenState=10s
resilience4j.timelimiter.instances.kvServiceCircuitBreaker.timeoutDuration=4s

#  Actuator
management.endpoints.web.exposure.include=health,info,gateway,prometheus
management.endpoint.health.show-details=always

logging.level.org.springframework.cloud.gateway=DEBUG