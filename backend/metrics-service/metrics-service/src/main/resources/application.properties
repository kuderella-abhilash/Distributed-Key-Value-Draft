spring.application.name=metrics-service
server.port=${SERVER_PORT:8084}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/metrics_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
app.kafka.topics.kv-events=${KV_EVENTS_TOPIC:kv-events}
app.kafka.topics.cluster-events=${CLUSTER_EVENTS_TOPIC:cluster-events}

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

app.cluster-service.url=${CLUSTER_SERVICE_URL:http://localhost:8083}
app.replication-service.url=${REPLICATION_SERVICE_URL:http://localhost:8082}